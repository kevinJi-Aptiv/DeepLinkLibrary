gradle.properties

# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the
# command line, check the build.gradle files instead (this file is only used by the IDE).
# For more details on how to configure your build environment visit
# http://www.gradle.org/configure-gradle-for-more-information

# Enables namespacing of each library's R class so that its R class includes only the
# resources declared in the library itself and does not include resources from
# dependencies,
# thereby reducing the size of the library's R class.
android.nonTransitiveRClass=true

# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official

# The Kotlin compiler should generate Java 8 compatible code.
kotlin.jvmTarget=11
